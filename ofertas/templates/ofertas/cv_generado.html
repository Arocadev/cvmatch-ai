{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CV Adaptado — CVMatch AI</title>
    <link rel="stylesheet" href="{% static 'ofertas/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>

<nav class="navbar">
    <a href="{% url 'inicio' %}" class="navbar-brand">CVMatch AI</a>
    <div class="navbar-nav">
        <a href="{% url 'buscador' %}" class="nav-link">
            <i class="ti ti-search"></i> Buscador
        </a>
        <div class="navbar-divider"></div>
        <a href="{% url 'lista_ofertas' %}" class="nav-link">Nuevas</a>
        <a href="{% url 'ofertas_vistas' %}" class="nav-link">Vistas</a>
        <a href="{% url 'ofertas_guardadas' %}" class="nav-link">Guardadas</a>
        <a href="{% url 'ofertas_descartadas' %}" class="nav-link">Descartadas</a>
    </div>
</nav>

<div class="container" style="max-width: 700px; margin-top: 32px;">

    <a href="{% url 'analizar_cv' oferta.pk %}" class="btn btn-outline" style="margin-bottom: 24px; display: inline-flex;">
        <i class="ti ti-arrow-left"></i> Volver al análisis
    </a>

    <div class="form-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h1 class="form-title" style="margin-bottom: 4px;">CV Adaptado</h1>
                <p style="font-size: 13px; color: #6b7280;">{{ oferta.titulo }} — {{ oferta.empresa }}</p>
            </div>
            <button onclick="copiarCV()" class="btn btn-outline">
                <i class="ti ti-copy"></i> Copiar
            </button>
        </div>

        <div id="cv-contenido" style="background: #f4f5f7; border-radius: 6px; padding: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap;">{{ cv_generado }}</div>

        <div style="margin-top: 16px; display: flex; gap: 8px;">
            <a href="{% url 'generar_cv' oferta.pk %}" class="btn btn-outline" id="btn-regenerar">
                <i class="ti ti-refresh"></i> Regenerar
            </a>
            <a href="{{ oferta.url_original }}" target="_blank" class="btn btn-primary">
                <i class="ti ti-external-link"></i> Ver oferta original
            </a>
        </div>
    </div>
</div>

<script>
function copiarCV() {
    const texto = document.getElementById('cv-contenido').innerText;
    navigator.clipboard.writeText(texto).then(() => {
        alert('CV copiado al portapapeles');
    });
}

document.addEventListener('DOMContentLoaded', function() {
    const btnRegenerar = document.getElementById('btn-regenerar');
    if (btnRegenerar) {
        btnRegenerar.addEventListener('click', function() {
            this.innerHTML = '<i class="ti ti-loader"></i> Generando...';
        });
    }
});
</script>

</body>
</html>
